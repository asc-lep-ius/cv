name: Build CV PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: typst-community/setup-typst@v4
        with:
          typst-version: "0.14.2"

      - name: Build all
        run: make all

      - name: Upload PDFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdfs
          path: output/*

      - name: Create/Update Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest CV
          files: |
            output/cv-software-full.pdf
            output/cv-software-onepage.pdf
            output/cv-ai-engineer-full.pdf
            output/cv-ai-engineer-onepage.pdf
            output/preview-*.png
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
